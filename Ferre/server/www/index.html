<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Codebreaker</title>
  <meta name="description" content="Dashboard voor het Codebreaker spel">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="page-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Raspberry Pi spel</p>
        <h1>Codebreaker</h1>
      </div>
      <div class="author">Ferre Terryn</div>
    </header>

    <section class="game-panel" aria-label="Huidige code">
      <div class="panel-heading">
        <div>
          <p class="eyebrow">Live invoer</p>
          <h2>Dozen</h2>
        </div>
        <span id="connectionStatus" class="status-pill status-loading">Verbinden...</span>
      </div>

      <div id="dozen" class="box-grid">
        <div class="doos" id="doos1">A</div>
        <div class="doos" id="doos2">B</div>
        <div class="doos" id="doos3">C</div>
        <div class="doos" id="doos4">D</div>
      </div>
    </section>

    <section class="dashboard-grid">
      <article class="card">
        <div class="card-title">
          <p class="eyebrow">Laatste poging</p>
          <h2 id="laatstePoging">- - - -</h2>
        </div>

        <div class="stats">
          <div>
            <span class="stat-label">Pogingen</span>
            <strong id="pogingen">0</strong>
          </div>
          <div>
            <span class="stat-label">Score</span>
            <strong id="score">0/4</strong>
          </div>
        </div>

        <p id="bericht" class="message">Spel wordt gestart...</p>
      </article>

      <article class="card history-card">
        <div class="card-title">
          <p class="eyebrow">Historiek</p>
          <h2>Geprobeerde codes</h2>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Poging</th>
                <th>Code</th>
                <th>Score</th>
              </tr>
            </thead>
            <tbody id="codesTabel">
              <tr>
                <td colspan="3" class="empty-row">Nog geen pogingen</td>
              </tr>
            </tbody>
          </table>
        </div>
      </article>
    </section>

    <section class="power-actions" aria-label="Raspberry Pi bediening">
      <div>
        <p class="eyebrow">Bediening</p>
        <h2>Raspberry Pi</h2>
      </div>

      <div class="actions">
        <button class="button button-success" type="button" id="restartButton">Spel herstarten</button>
        <button class="button button-secondary" type="button" id="rebootButton">Pi rebooten</button>
        <button class="button button-danger" type="button" id="shutdownButton">Pi afsluiten</button>
      </div>
    </section>
  </main>

  <script>
    const fields = {
      boxes: [
        document.getElementById("doos1"),
        document.getElementById("doos2"),
        document.getElementById("doos3"),
        document.getElementById("doos4")
      ],
      latest: document.getElementById("laatstePoging"),
      attempts: document.getElementById("pogingen"),
      score: document.getElementById("score"),
      message: document.getElementById("bericht"),
      table: document.getElementById("codesTabel"),
      status: document.getElementById("connectionStatus")
    };

    function setStatus(text, className) {
      fields.status.textContent = text;
      fields.status.className = `status-pill ${className}`;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderHistory(rows) {
      if (!rows || rows.length === 0) {
        fields.table.innerHTML = '<tr><td colspan="3" class="empty-row">Nog geen pogingen</td></tr>';
        return;
      }

      fields.table.innerHTML = rows.map((row) => `
        <tr>
          <td>${escapeHtml(row.poging)}</td>
          <td class="code-cell">${escapeHtml(row.code)}</td>
          <td>${escapeHtml(row.score)}</td>
        </tr>
      `).join("");
    }

    function renderBoxFeedback(feedback) {
      const states = feedback || ["neutral", "neutral", "neutral", "neutral"];

      fields.boxes.forEach((box, index) => {
        box.classList.remove("doos-correct", "doos-wrong", "doos-neutral");
        box.classList.add(`doos-${states[index] || "neutral"}`);
      });
    }

    async function postAction(endpoint, question) {
      if (!window.confirm(question)) {
        return;
      }

      try {
        const response = await fetch(endpoint, { method: "POST" });

        if (!response.ok) {
          throw new Error("Actie mislukt");
        }

        fields.message.textContent = "Actie verstuurd.";
      } catch (error) {
        fields.message.textContent = "Actie mislukt. Open de pagina via Flask, niet als los HTML-bestand.";
      }
    }

    async function refreshValues() {
      try {
        const response = await fetch("/values", { cache: "no-store" });

        if (!response.ok) {
          throw new Error("Geen geldige serverrespons");
        }

        const data = await response.json();
        const boxes = data.dozen || ["A", "B", "C", "D"];
        const latest = data.laatste_poging || ["-", "-", "-", "-"];

        boxes.forEach((value, index) => {
          fields.boxes[index].textContent = value;
        });

        renderBoxFeedback(data.feedback);
        fields.latest.textContent = latest.join(" ");
        fields.attempts.textContent = data.pogingen ?? 0;
        fields.score.textContent = `${data.score ?? 0}/4`;
        fields.message.textContent = data.bericht || "";
        renderHistory(data.gegokte_codes);
        setStatus("Online", "status-online");
      } catch (error) {
        setStatus("Offline", "status-offline");
        fields.message.textContent = "Kan geen verbinding maken met de Flask-server.";
      }
    }

    document.getElementById("rebootButton").addEventListener("click", () => {
      postAction("/rebootPi", "Weet je zeker dat je de Raspberry Pi wilt rebooten?");
    });

    document.getElementById("restartButton").addEventListener("click", () => {
      postAction("/restartGame", "Wil je het spel opnieuw starten?");
    });

    document.getElementById("shutdownButton").addEventListener("click", () => {
      postAction("/shutdownPi", "Weet je zeker dat je de Raspberry Pi wilt afsluiten?");
    });

    refreshValues();
    window.setInterval(refreshValues, 500);
  </script>
</body>
</html>
